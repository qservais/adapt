name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  typecheck-libs:
    name: Lib rebuild check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Single cache entry covering every lib package that has a dist/ output.
      # New shared libraries are picked up automatically — no manual changes
      # to this file are needed when a new lib is added under lib/.
      - name: Cache all lib dist outputs
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: |
            lib/*/dist
            lib/*/tsconfig.tsbuildinfo
          key: libs-${{ hashFiles('lib/*/src/**', 'lib/*/tsconfig.json', 'tsconfig.base.json', 'pnpm-lock.yaml') }}

      - name: Rebuild lib dist files
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: pnpm run typecheck:libs:force

      - name: Fail if dist files are stale
        run: sh scripts/check-lib-dist-clean.sh

  typecheck-all:
    name: Full workspace typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm run typecheck
