name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  typecheck-libs:
    name: Lib rebuild check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache lib dist
        id: cache-lib-dist
        uses: actions/cache@v4
        with:
          path: |
            lib/api-client-react/dist
            lib/api-client-react/tsconfig.tsbuildinfo
          key: lib-api-client-react-${{ hashFiles('lib/api-client-react/src/**', 'lib/api-client-react/tsconfig.json', 'tsconfig.base.json', 'pnpm-lock.yaml') }}

      - name: Rebuild lib dist files
        if: steps.cache-lib-dist.outputs.cache-hit != 'true'
        run: pnpm run typecheck:libs:force

      - name: Fail if dist files are stale
        run: sh scripts/check-lib-dist-clean.sh

  typecheck-all:
    name: Full workspace typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm run typecheck
