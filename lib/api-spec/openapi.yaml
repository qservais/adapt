      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coach/credit-notes:
    get:
      operationId: getCoachCreditNotes
      tags: [invoicing]
      summary: List credit notes issued by the coach
      responses:
        "200":
          description: Credit notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CreditNoteListItem"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponseError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          $ref: "#/components/schemas/ErrorResponseError"
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [athlete, coach]
      required:
        - email
        - password
        - firstName
        - role

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    RegisterAthleteRequest:
      type: object
      properties:
        email:
          type: string
        loginCode:
          type: string
          pattern: "^[0-9]{6}$"
          description: 6-digit PIN chosen by the athlete, used like a password
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        age:
          type: integer
        primaryGoal:
          type: string
        fitnessLevel:
          type: string
        trainingFrequency:
          type: integer
          description: Target sessions per week
        hasInjuryHistory:
          type: boolean
        injuries:
          type: string
          description: Required when hasInjuryHistory is true
        medicalContraindication:
          type: boolean
          description: PAR-Q-style safety triage flag, does not block signup
        acquisitionSource:
          type: string
        consent:
          type: boolean
          description: Must be true — explicit GDPR consent for health-data processing
      required:
        - email
        - loginCode
        - firstName
        - lastName
        - phone
        - hasInjuryHistory
        - medicalContraindication
        - consent

    LoginCodeRequest:
      type: object
      properties:
        email:
          type: string
        code:
          type: string
          pattern: "^[0-9]{6}$"
      required:
        - email
        - code

    ResetLoginCodeRequest:
      type: object
      properties:
        token:
          type: string
        newLoginCode:
          type: string
          pattern: "^[0-9]{6}$"
      required:
        - token
        - newLoginCode

    StudioSettings:
      type: object
      properties:
        coachId:
          type: string
        studioName:
          type: string
        studioAddress:
          type: string
          nullable: true
        whatsappNumber:
          type: string
          nullable: true
        announcementLink:
          type: string
          nullable: true
        defaultCancellationWindowHours:
          type: integer
        vatRegime:
          type: string
          enum: [franchise, assujetti]
        vatNumber:
          type: string
          nullable: true
        invoicePrefix:
          type: string
        accountantEmail:
          type: string
          nullable: true
      required:
        - coachId
        - studioName
        - defaultCancellationWindowHours
        - vatRegime
        - invoicePrefix

    UpdateStudioSettingsRequest:
      type: object
      properties:
        studioName:
          type: string
        studioAddress:
          type: string
          nullable: true
        whatsappNumber:
          type: string
          nullable: true
        announcementLink:
          type: string
          nullable: true
        defaultCancellationWindowHours:
          type: integer
          minimum: 1
          maximum: 168
        vatRegime:
          type: string
          enum: [franchise, assujetti]
        vatNumber:
          type: string
          nullable: true
        invoicePrefix:
          type: string
        accountantEmail:
          type: string
          nullable: true

    ShopPack:
      type: object
      properties:
        id:
          type: string
        coachId:
          type: string
        creditType:
          type: string
          enum: [collectif, individuel]
        name:
          type: string
        credits:
          type: integer
        priceCents:
          type: integer
        validityMonths:
          type: integer
          nullable: true
        tag:
          type: string
          nullable: true
        isActive:
          type: boolean
      required:
        - id
        - coachId
        - creditType
        - name
        - credits
        - priceCents
        - isActive

    ShopPackWithPrice:
      allOf:
        - $ref: "#/components/schemas/ShopPack"
        - type: object
          properties:
            currentPriceCents:
              type: integer
              description: List price, or the active promo price if one currently applies
            hasActivePromo:
              type: boolean
          required:
            - currentPriceCents
            - hasActivePromo

    UpsertShopPackRequest:
      type: object
      properties:
        creditType:
          type: string
          enum: [collectif, individuel]
        name:
          type: string
        credits:
          type: integer
          minimum: 1
        priceCents:
          type: integer
          minimum: 0
        validityMonths:
          type: integer
          nullable: true
        tag:
          type: string
          nullable: true

    ShopPromo:
      type: object
      properties:
        id:
          type: string
        packId:
          type: string
        discountedPriceCents:
          type: integer
        startsAt:
          type: string
        expiresAt:
          type: string
        createdBy:
          type: string
      required:
        - id
        - packId
        - discountedPriceCents
        - startsAt
        - expiresAt

    CreateShopPromoRequest:
      type: object
      properties:
        packId:
          type: string
        discountedPriceCents:
          type: integer
          minimum: 0
        durationDays:
          type: integer
          minimum: 1
          maximum: 90
      required:
        - packId
        - discountedPriceCents
        - durationDays

    SubscriptionPlan:
      type: object
      properties:
        id:
          type: string
        coachId:
          type: string
        name:
          type: string
        priceCents:
          type: integer
        presentialText:
          type: string
          nullable: true
        tag:
          type: string
          nullable: true
        engagementMonths:
          type: integer
          nullable: true
        isActive:
          type: boolean
      required:
        - id
        - coachId
        - name
        - priceCents
        - isActive

    UpdateSubscriptionPlanRequest:
      type: object
      properties:
        priceCents:
          type: integer
          minimum: 0
        engagementMonths:
          type: integer
          nullable: true

    CreateCheckoutSessionRequest:
      type: object
      properties:
        type:
          type: string
          enum: [pack, subscription]
        id:
          type: string
        successUrl:
          type: string
        cancelUrl:
          type: string
      required:
        - type
        - id
        - successUrl
        - cancelUrl

    CheckoutSessionResponse:
      type: object
      properties:
        checkoutUrl:
          type: string
          nullable: true
      required:
        - checkoutUrl

    CreditBalances:
      type: object
      properties:
        collectif:
          type: integer
        individuel:
          type: integer
      required:
        - collectif
        - individuel

    GiftCreditsRequest:
      type: object
      properties:
        athleteIds:
          type: array
          items:
            type: string
        creditType:
          type: string
          enum: [collectif, individuel]
        quantity:
          type: integer
          minimum: 1
          maximum: 50
        message:
          type: string
      required:
        - athleteIds
        - creditType
        - quantity

    ClassTemplate:
      type: object
      properties:
        id:
          type: string
        coachId:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        capacity:
          type: integer
        priceCents:
          type: integer
        creditCost:
          type: integer
        durationMin:
          type: integer
        cancellationWindowHours:
          type: integer
          nullable: true
        isActive:
          type: boolean
      required:
        - id
        - coachId
        - name
        - capacity
        - priceCents
        - creditCost
        - durationMin
        - isActive

    UpsertClassTemplateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        capacity:
          type: integer
          minimum: 1
        priceCents:
          type: integer
          minimum: 0
        creditCost:
          type: integer
          minimum: 1
        durationMin:
          type: integer
          minimum: 5
        cancellationWindowHours:
          type: integer
          nullable: true

    ScheduleClassRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [once, weekly]
        startAt:
          type: string
          description: Required when mode=once
        dayOfWeek:
          type: integer
          description: Required when mode=weekly (0=Sunday..6=Saturday)
        startTime:
          type: string
          description: "Required when mode=weekly, HH:MM"
        weeksAhead:
          type: integer
      required:
        - mode

    ClassOccurrence:
      type: object
      properties:
        id:
          type: string
        templateId:
          type: string
        coachId:
          type: string
        startAt:
          type: string
        durationMin:
          type: integer
        capacity:
          type: integer
        status:
          type: string
          enum: [scheduled, cancelled]
      required:
        - id
        - templateId
        - startAt
        - durationMin
        - capacity
        - status

    ClassOccurrenceWithAvailability:
      allOf:
        - $ref: "#/components/schemas/ClassOccurrence"
        - type: object
          properties:
            name:
              type: string
            description:
              type: string
              nullable: true
            priceCents:
              type: integer
            creditCost:
              type: integer
            coachFirstName:
              type: string
            spotsBooked:
              type: integer
            spotsAvailable:
              type: integer
            isBooked:
              type: boolean
            bookingId:
              type: string
              nullable: true
            waitlistStatus:
              type: string
              nullable: true
          required:
            - name
            - priceCents
            - creditCost
            - spotsBooked
            - spotsAvailable
            - isBooked

    ClassBooking:
      type: object
      properties:
        id:
          type: string
        occurrenceId:
          type: string
        athleteId:
          type: string
          nullable: true
        status:
          type: string
        paymentMode:
          type: string
        paymentStatus:
          type: string
      required:
        - id
        - occurrenceId
        - status
        - paymentMode

    CancelBookingResponse:
      type: object
      properties:
        success:
          type: boolean
        refunded:
          type: boolean
        lateCancellation:
          type: boolean
        message:
          type: string
      required:
        - success
        - refunded
        - lateCancellation

    ClassWaitlistEntry:
      type: object
      properties:
        id:
          type: string
        occurrenceId:
          type: string
        athleteId:
          type: string
        status:
          type: string
          enum: [waiting, offered, expired, confirmed, withdrawn]
        offerExpiresAt:
          type: string
          nullable: true
      required:
        - id
        - occurrenceId
        - athleteId
        - status

    CoachAvailabilitySlot:
      type: object
      properties:
        id:
          type: string
        coachId:
          type: string
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
        startTime:
          type: string
        isActive:
          type: boolean
      required:
        - id
        - coachId
        - dayOfWeek
        - startTime

    AddAvailabilitySlotRequest:
      type: object
      properties:
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
        startTime:
          type: string
      required:
        - dayOfWeek
        - startTime

    CreateOneOnOneRequest:
      type: object
      properties:
        date:
          type: string
        time:
          type: string
      required:
        - date
