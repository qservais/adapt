openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ADAPT by LMJ API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User profile
  - name: checkins
    description: Daily check-ins
  - name: sessions
    description: Training sessions
  - name: programs
    description: Training programs (coach)
  - name: coach
    description: Coach dashboard
  - name: exercises
    description: Exercise library
  - name: messages
    description: Messaging
  - name: notifications
    description: Notifications
  - name: challenges
    description: Challenges
  - name: appointments
    description: Coach appointments
  - name: athlete
    description: Athlete-specific endpoints
  - name: studio
    description: Studio settings (Mouv'Up — WhatsApp number, VAT regime, cancellation window...)
  - name: shop
    description: Credit packs, subscriptions, promos, and the athlete credit ledger
  - name: classes
    description: Bookable group classes, capacity, and waitlist
  - name: invoicing
    description: Legal invoices, credit notes, and accountant CSV export

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      security: []
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      security: []
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register-athlete:
    post:
      operationId: registerAthlete
      tags: [auth]
      security: []
      summary: Open 2-step athlete signup (identity + sport profile/PAR-Q/consent), PIN-based auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterAthleteRequest"
      responses:
        "201":
          description: Athlete account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login-code:
    post:
      operationId: loginWithCode
      tags: [auth]
      security: []
      summary: Athlete-app login with email + 6-digit PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginCodeRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/reset-login-code:
    post:
      operationId: resetLoginCode
      tags: [auth]
      security: []
      summary: Set a new 6-digit PIN using an emailed reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetLoginCodeRequest"
      responses:
        "200":
          description: Login code updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      security: []
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      security: []
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # STUDIO SETTINGS
  /studio-settings:
    get:
      operationId: getStudioSettings
      tags: [studio]
      summary: Get the coach's studio settings (defaults if none saved yet)
      responses:
        "200":
          description: Studio settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudioSettings"
    put:
      operationId: updateStudioSettings
      tags: [studio]
      summary: Create or update the coach's studio settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudioSettingsRequest"
      responses:
        "200":
          description: Updated studio settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudioSettings"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # SHOP
  /shop/packs:
    get:
      operationId: getShopPacks
      tags: [shop]
      summary: List active credit packs with resolved current price (promo-aware)
      responses:
        "200":
          description: Packs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShopPackWithPrice"

  /shop/subscriptions:
    get:
      operationId: getShopSubscriptions
      tags: [shop]
      summary: List active subscription plans
      responses:
        "200":
          description: Subscription plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubscriptionPlan"

  /shop/checkout-session:
    post:
      operationId: createCheckoutSession
      tags: [shop]
      summary: Start a Stripe Checkout session for a pack or subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutSessionRequest"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "503":
          description: Stripe not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/credits:
    get:
      operationId: getMyCredits
      tags: [shop]
      summary: Get the current athlete's credit balances
      responses:
        "200":
          description: Balances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditBalances"

  /coach/shop/packs:
    get:
      operationId: getCoachShopPacks
      tags: [shop]
      summary: List the coach's packs (including inactive)
      responses:
        "200":
          description: Packs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShopPack"
    post:
      operationId: createShopPack
      tags: [shop]
      summary: Create a new credit pack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertShopPackRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopPack"

  /coach/shop/packs/{id}:
    put:
      operationId: updateShopPack
      tags: [shop]
      summary: Update a credit pack
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertShopPackRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopPack"
    delete:
      operationId: deleteShopPack
      tags: [shop]
      summary: Deactivate a credit pack (soft delete — past purchases stay valid)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /coach/shop/promos:
    post:
      operationId: createShopPromo
      tags: [shop]
      summary: Launch a time-limited promo on a pack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShopPromoRequest"
      responses:
        "201":
          description: Promo created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopPromo"

  /coach/shop/promos/{id}:
    delete:
      operationId: endShopPromo
      tags: [shop]
      summary: End a promo immediately
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /coach/shop/subscriptions/{id}:
    put:
      operationId: updateSubscriptionPlan
      tags: [shop]
      summary: Update a subscription plan's price/engagement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubscriptionPlanRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlan"

  /coach/credits/gift:
    post:
      operationId: giftCredits
      tags: [shop]
      summary: Gift credits to one or more athletes (no charge)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GiftCreditsRequest"
      responses:
        "201":
          description: Credits gifted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  recipientCount:
                    type: integer

  # CLASSES
  /classes/occurrences:
    get:
      operationId: getClassOccurrences
      tags: [classes]
      summary: List upcoming scheduled classes with live capacity and the caller's booking/waitlist status
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Occurrences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClassOccurrenceWithAvailability"

  /classes/{occurrenceId}/book:
    post:
      operationId: bookClass
      tags: [classes]
      summary: Book a class with 1 (or the class's) collective credit
      parameters:
        - name: occurrenceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassBooking"
        "409":
          description: Class is full or already booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /classes/bookings/{bookingId}/cancel:
    post:
      operationId: cancelClassBooking
      tags: [classes]
      summary: Cancel a booking (auto-refunds the credit unless inside the cancellation window)
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelBookingResponse"

  /classes/{occurrenceId}/waitlist:
    post:
      operationId: joinClassWaitlist
      tags: [classes]
      summary: Join the waitlist for a full class
      parameters:
        - name: occurrenceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassWaitlistEntry"
    delete:
      operationId: leaveClassWaitlist
      tags: [classes]
      summary: Leave the waitlist
      parameters:
        - name: occurrenceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Left
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /classes/{occurrenceId}/waitlist/confirm:
    post:
      operationId: confirmClassWaitlistOffer
      tags: [classes]
      summary: Confirm an offered waitlist spot within the 30-minute window (debits 1 credit)
      parameters:
        - name: occurrenceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Confirmed and booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassBooking"
        "410":
          description: Offer expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coach/classes/templates:
    get:
      operationId: getCoachClassTemplates
      tags: [classes]
      summary: List the coach's class templates
      responses:
        "200":
          description: Templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClassTemplate"
    post:
      operationId: createClassTemplate
      tags: [classes]
      summary: Create a class template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertClassTemplateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassTemplate"

  /coach/classes/templates/{id}:
    put:
      operationId: updateClassTemplate
      tags: [classes]
      summary: Update a class template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertClassTemplateRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassTemplate"
    delete:
      operationId: deleteClassTemplate
      tags: [classes]
      summary: Deactivate a class template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /coach/classes/templates/{id}/schedule:
    post:
      operationId: scheduleClassTemplate
      tags: [classes]
      summary: Schedule a template onto the calendar — one-off (real date) or weekly-recurring
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleClassRequest"
      responses:
        "201":
          description: Occurrence(s) created
          content:
            application/json:
              schema:
                type: object
                properties:
                  occurrences:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClassOccurrence"

  /coach/classes/occurrences:
    get:
      operationId: getCoachClassOccurrences
      tags: [classes]
      summary: Coach-facing occurrence list with fill counts and waitlist size
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Occurrences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CoachClassOccurrence"

  /coach/classes/occurrences/{occurrenceId}/register:
    post:
      operationId: manualRegisterForClass
      tags: [classes]
      summary: Manually register a participant (existing athlete or guest/trial name)
      parameters:
        - name: occurrenceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualRegisterRequest"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassBooking"

  /coach/classes/occurrences/{occurrenceId}/participants:
    get:
      operationId: getOccurrenceParticipants
      tags: [classes]
      summary: List confirmed participants for a class, with today's ADAPT score
      parameters:
        - name: occurrenceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Participants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClassParticipant"

  /coach/classes/occurrences/{occurrenceId}/cancel:
    post:
      operationId: cancelClassOccurrence
      tags: [classes]
      summary: Cancel the whole class — refunds every confirmed booking and notifies everyone
      parameters:
        - name: occurrenceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  notifiedCount:
                    type: integer

  /coach/classes/bookings/{bookingId}/waive-late-cancellation:
    post:
      operationId: waiveLateCancellation
      tags: [classes]
      summary: Forgive a late cancellation after the fact (refunds the credit)
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Waived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /coach/agenda:
    get:
      operationId: getCoachAgenda
      tags: [classes]
      summary: Unified week/month agenda — group classes and 1:1s merged and sorted
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Agenda entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgendaEntry"

  # USERS
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/badges:
    get:
      operationId: getBadges
      tags: [users]
      summary: Get user badges
      responses:
        "200":
          description: Badges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadgesResponse"

  /users/prs:
    get:
      operationId: getPersonalRecords
      tags: [users]
      summary: Get user personal records
      responses:
        "200":
          description: Personal records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonalRecordsResponse"

  /users/prs/{exerciseId}/history:
    get:
      operationId: getExercisePRHistory
      tags: [users]
      summary: Get PR history for a specific exercise
      parameters:
        - name: exerciseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PR history for the exercise
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PRHistoryResponse"

  /users/weekly-recap/latest:
    get:
      operationId: getWeeklyRecap
      tags: [users]
      summary: Get latest weekly recap
      responses:
        "200":
          description: Weekly recap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyRecapResponse"

  # CHECK-INS
  /checkins:
    post:
      operationId: submitCheckin
      tags: [checkins]
      summary: Submit daily check-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckinRequest"
      responses:
        "201":
          description: Check-in submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckinResponse"
        "409":
          description: Already checked in today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Check-in window closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /checkins/today:
    get:
      operationId: getTodayCheckin
      tags: [checkins]
      summary: Get today's check-in
      responses:
        "200":
          description: Today's check-in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckinData"
        "404":
          description: No check-in today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /checkins/history:
    get:
      operationId: getCheckinHistory
      tags: [checkins]
      summary: Get check-in history (30 days)
      responses:
        "200":
          description: Check-in history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CheckinData"

  # SESSIONS
  /sessions/today:
    get:
      operationId: getTodaySession
      tags: [sessions]
      summary: Get today's adapted session
      responses:
        "200":
          description: Today's adapted session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
        "403":
          description: Session not unlocked (check-in required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/today-all:
    get:
      operationId: getTodaySessionAll
      tags: [sessions]
      summary: Get all of today's sessions (multi-session programs)
      responses:
        "200":
          description: All of today's sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionDetail"

  /sessions/missed:
    get:
      operationId: getMissedSessions
      tags: [sessions]
      summary: Get missed sessions in the last 7 days
      responses:
        "200":
          description: Missed sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissedSessionsResponse"

  /sessions/history:
    get:
      operationId: getSessionHistory
      tags: [sessions]
      summary: Get session history (30 days)
      responses:
        "200":
          description: Session history
