      responses:
        "200":
          description: Invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvoiceListItem"

  /coach/invoices/{id}/credit-note:
    post:
      operationId: createInvoiceCreditNote
      tags: [invoicing]
      summary: Issue a credit note against an invoice (corrections only — invoices are never edited or deleted)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCreditNoteRequest"
      responses:
        "201":
          description: Credit note issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "409":
          description: Invoice already credited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coach/invoices/export.csv:
    get:
      operationId: exportCoachInvoicesCsv
      tags: [invoicing]
      summary: Monthly accounting export (CSV) for the accountant
      parameters:
