components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponseError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          $ref: "#/components/schemas/ErrorResponseError"
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [athlete, coach]
      required:
        - email
        - password
        - firstName
        - role

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
        firstName:
          type: string
        lastName:
          type: string
          nullable: true
        gender:
          type: string
          nullable: true
        birthDate:
          type: string
          nullable: true
        age:
          type: integer
          nullable: true
        weightKg:
          type: number
          nullable: true
        heightCm:
          type: integer
          nullable: true
        trainingFrequency:
          type: integer
          nullable: true
        injuries:
          type: string
          nullable: true
        fitnessLevel:
          type: string
          nullable: true
        primaryGoal:
          type: string
          nullable: true
        cycleTracking:
          type: boolean
        lastPeriodDate:
          type: string
          nullable: true
        avgCycleDays:
          type: integer
          nullable: true
        coachId:
          type: string
          nullable: true
        inviteCode:
          type: string
          nullable: true
        coachName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
      required:
        - id
        - email
        - role
        - firstName

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required:
        - accessToken
        - refreshToken
        - user

    UpdateProfileRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        gender:
          type: string
        birthDate:
          type: string
        age:
          type: integer
        weightKg:
          type: number
        heightCm:
          type: integer
        trainingFrequency:
          type: integer
        injuries:
          type: string
        fitnessLevel:
          type: string
        primaryGoal:
          type: string
        cycleTracking:
          type: boolean
        lastPeriodDate:
          type: string
          nullable: true
        avgCycleDays:
          type: integer
          nullable: true

    CheckinRequest:
      type: object
      properties:
        sleep:
          type: integer
          minimum: 1
          maximum: 5
        energy:
          type: integer
          minimum: 1
          maximum: 5
        stress:
          type: integer
          minimum: 1
          maximum: 5
        soreness:
          type: integer
          minimum: 1
          maximum: 5
        motivation:
          type: integer
          minimum: 1
          maximum: 5
        hasPain:
          type: boolean
        painNotes:
          type: string
          nullable: true
        cyclePhase:
          type: string
          nullable: true
          enum: [menstrual, follicular, ovulatory, luteal]
      required:
        - sleep
        - energy
        - stress
        - soreness
        - motivation

    CheckinData:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
        sleep:
          type: integer
          nullable: true
        energy:
          type: integer
          nullable: true
        stress:
          type: integer
          nullable: true
        soreness:
          type: integer
          nullable: true
        motivation:
          type: integer
          nullable: true
        hasPain:
          type: boolean
        painNotes:
          type: string
          nullable: true
        cyclePhase:
          type: string
          nullable: true
        adaptScore:
          type: integer
        sessionMode:
          type: string
        createdAt:
          type: string
      required:
        - id
        - date
        - adaptScore
        - sessionMode

    NewBadgeItem:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        icon:
          type: string
      required:
        - code
        - name
        - icon

    CheckinResponse:
      type: object
      properties:
        checkin:
          $ref: "#/components/schemas/CheckinData"
        sessionPreview:
          type: object
          properties:
            name:
              type: string
            estimatedDurationMin:
              type: integer
              nullable: true
            exerciseCount:
              type: integer
          nullable: true
        newBadges:
          type: array
          items:
            $ref: "#/components/schemas/NewBadgeItem"
      required:
        - checkin

    SessionExerciseItem:
      type: object
      properties:
        id:
          type: string
        exerciseId:
          type: string
        exerciseName:
          type: string
        category:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        gifUrl:
          type: string
          nullable: true
        muscleGroups:
          nullable: true
        equipment:
          nullable: true
        description:
          type: string
          nullable: true
        demoUrl:
          type: string
          nullable: true
        orderIndex:
          type: integer
        sets:
          type: integer
        reps:
          type: string
          nullable: true
        nominalLoadKg:
          type: number
          nullable: true
        adaptedLoadKg:
          type: number
          nullable: true
        restSeconds:
          type: integer
          nullable: true
        durationSeconds:
          type: integer
          nullable: true
        coachCue:
          type: string
          nullable: true
        lastUsedLoadKg:
          type: number
          nullable: true
        lastUsedDate:
          type: string
          nullable: true
        lastUsedRepsPerSet:
          type: array
          items:
            type: number
          nullable: true
        blockId:
          type: string
          nullable: true
        tempo:
          type: string
          nullable: true
        supersetGroup:
          type: string
          nullable: true
        supersetLabel:
          type: string
          nullable: true
      required:
        - id
        - exerciseId
        - exerciseName
        - orderIndex
        - sets

    SessionBlockItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        orderIndex:
          type: integer
        name:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        estimatedDurationMin:
          type: integer
          nullable: true
        conditioningFormat:
          type: string
          nullable: true
      required:
        - id
        - type
        - orderIndex

    SessionDetail:
      type: object
      properties:
        sessionLogId:
          type: string
        sessionId:
          type: string
          nullable: true
        name:
          type: string
        mode:
          type: string
        sessionType:
          type: string
          nullable: true
        sessionLocation:
          type: string
          nullable: true
        scheduledTime:
          type: string
          nullable: true
        visioLink:
          type: string
          nullable: true
        estimatedDurationMin:
          type: integer
          nullable: true
        coachNotes:
          type: string
          nullable: true
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/SessionExerciseItem"
        blocks:
          type: array
          items:
            $ref: "#/components/schemas/SessionBlockItem"
        adaptScore:
          type: integer
        overriddenByCoach:
          type: boolean
        athletePRs:
          type: object
          additionalProperties:
            type: number
        completedAt:
          type: string
          nullable: true
        durationMin:
          type: integer
          nullable: true
        rpe:
          type: integer
          nullable: true
        sessionsToday:
          type: integer
        sessionsTodayCompleted:
          type: integer
        sessionIndex:
          type: integer
        isFreeSession:
          type: boolean
      required:
        - sessionLogId
        - name
        - mode
        - exercises
        - adaptScore

    CompleteSessionNewPR:
      type: object
      properties:
        exerciseId:
          type: string
        exerciseName:
          type: string
        loadKg:
          type: number
        previousLoadKg:
          type: number
          nullable: true
      required:
        - exerciseId
        - exerciseName
        - loadKg

    CompleteSessionResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        newPRs:
          type: array
          items:
            $ref: "#/components/schemas/CompleteSessionNewPR"
        newBadges:
          type: array
          items:
            $ref: "#/components/schemas/NewBadgeItem"
        durationMin:
          type: integer
          nullable: true
      required:
        - success
        - newPRs
        - newBadges

    MissedSessionItem:
      type: object
      properties:
        date:
          type: string
        sessionId:
          type: string
        sessionName:
          type: string
        estimatedDurationMin:
          type: integer
          nullable: true
      required:
        - date
        - sessionId
        - sessionName

    MissedSessionsResponse:
      type: object
      properties:
        missed:
          type: array
          items:
            $ref: "#/components/schemas/MissedSessionItem"
      required:
        - missed

    BadgeItem:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        category:
          type: string
        sortOrder:
          type: integer
          nullable: true
        unlocked:
          type: boolean
        unlockedAt:
          type: string
          nullable: true
      required:
        - code
        - name
        - description
        - icon
        - category
        - unlocked

    BadgesResponse:
      type: object
      properties:
        badges:
          type: array
          items:
            $ref: "#/components/schemas/BadgeItem"
        total:
          type: integer
        unlockedCount:
          type: integer
      required:
        - badges
        - total
        - unlockedCount

    PersonalRecord:
      type: object
      properties:
        exerciseId:
          type: string
        exerciseName:
          type: string
        loadKg:
          type: number
        reps:
          type: integer
        previousLoadKg:
          type: number
          nullable: true
        achievedAt:
          type: string
        isRecent:
          type: boolean
      required:
        - exerciseId
        - exerciseName
        - loadKg
        - reps

    PersonalRecordsResponse:
      type: object
      properties:
        personalRecords:
          type: array
          items:
            $ref: "#/components/schemas/PersonalRecord"
        total:
          type: integer
      required:
        - personalRecords
        - total

    WeeklyRecap:
      type: object
      properties:
        weekStart:
          type: string
        weekEnd:
          type: string
        sessionsCompleted:
          type: integer
