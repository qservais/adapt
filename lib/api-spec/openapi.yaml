openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ADAPT by LMJ API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User profile
  - name: checkins
    description: Daily check-ins
  - name: sessions
    description: Training sessions
  - name: programs
    description: Training programs (coach)
  - name: coach
    description: Coach dashboard
  - name: exercises
    description: Exercise library
  - name: messages
    description: Messaging
  - name: notifications
    description: Notifications
  - name: challenges
    description: Challenges
  - name: appointments
    description: Coach appointments
  - name: athlete
    description: Athlete-specific endpoints

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      security: []
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      security: []
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      security: []
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      security: []
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # USERS
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/badges:
    get:
      operationId: getBadges
      tags: [users]
      summary: Get user badges
      responses:
        "200":
          description: Badges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadgesResponse"

  /users/prs:
    get:
      operationId: getPersonalRecords
      tags: [users]
      summary: Get user personal records
      responses:
        "200":
          description: Personal records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonalRecordsResponse"

  /users/prs/{exerciseId}/history:
    get:
      operationId: getExercisePRHistory
      tags: [users]
      summary: Get PR history for a specific exercise
      parameters:
        - name: exerciseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PR history for the exercise
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PRHistoryResponse"

  /users/weekly-recap/latest:
    get:
      operationId: getWeeklyRecap
      tags: [users]
      summary: Get latest weekly recap
      responses:
        "200":
          description: Weekly recap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyRecapResponse"

  # CHECK-INS
  /checkins:
    post:
      operationId: submitCheckin
      tags: [checkins]
      summary: Submit daily check-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckinRequest"
      responses:
        "201":
          description: Check-in submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckinResponse"
        "409":
          description: Already checked in today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Check-in window closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /checkins/today:
    get:
      operationId: getTodayCheckin
      tags: [checkins]
      summary: Get today's check-in
      responses:
        "200":
          description: Today's check-in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckinData"
        "404":
          description: No check-in today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /checkins/history:
    get:
      operationId: getCheckinHistory
      tags: [checkins]
      summary: Get check-in history (30 days)
      responses:
        "200":
          description: Check-in history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CheckinData"

  # SESSIONS
  /sessions/today:
    get:
      operationId: getTodaySession
      tags: [sessions]
      summary: Get today's adapted session
      responses:
        "200":
          description: Today's adapted session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
        "403":
          description: Session not unlocked (check-in required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/today-all:
    get:
      operationId: getTodaySessionAll
      tags: [sessions]
      summary: Get all of today's sessions (multi-session programs)
      responses:
        "200":
          description: All of today's sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionDetail"

  /sessions/missed:
    get:
      operationId: getMissedSessions
      tags: [sessions]
      summary: Get missed sessions in the last 7 days
      responses:
        "200":
          description: Missed sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissedSessionsResponse"

  /sessions/history:
    get:
      operationId: getSessionHistory
      tags: [sessions]
      summary: Get session history (30 days)
      responses:
        "200":
          description: Session history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionLogSummary"

  /sessions/{sessionId}/start:
    put:
      operationId: startSession
      tags: [sessions]
      summary: Start a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /sessions/{sessionId}/start-free:
    post:
      operationId: startFreeSession
      tags: [sessions]
      summary: Start a free (library) session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Free session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/complete:
    post:
      operationId: completeSession
      tags: [sessions]
      summary: Complete a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteSessionRequest"
      responses:
        "200":
          description: Session completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteSessionResult"

  /sessions/{sessionId}/feedback:
    post:
      operationId: submitSessionFeedback
      tags: [sessions]
      summary: Submit session feedback
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionFeedbackRequest"
      responses:
        "200":
          description: Feedback submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /sessions/free-custom:
    post:
      operationId: startFreeCustomSession
      tags: [sessions]
      summary: Start a custom free session with selected exercises
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FreeCustomSessionRequest"
      responses:
        "201":
          description: Custom session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"

  /sessions/{sessionLogId}/exercise-logs:
    get:
      operationId: getExerciseLogs
      tags: [sessions]
      summary: Get exercise logs for a session
      parameters:
        - name: sessionLogId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Exercise logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionExerciseLog"
    post:
      operationId: logExercise
      tags: [sessions]
      summary: Log an exercise for a session
      parameters:
        - name: sessionLogId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogExerciseRequest"
      responses:
        "201":
          description: Exercise logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /sessions/{sessionLogId}/exercise-logs/{exerciseId}:
    delete:
      operationId: deleteExerciseLog
      tags: [sessions]
      summary: Delete an exercise log entry
      parameters:
        - name: sessionLogId
          in: path
          required: true
          schema:
            type: string
        - name: exerciseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Exercise log deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # PROGRAMS
  /programs:
    get:
      operationId: getPrograms
      tags: [programs]
      summary: Get coach programs
      responses:
        "200":
          description: Programs list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgramSummary"
    post:
      operationId: createProgram
      tags: [programs]
      summary: Create a program
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProgramRequest"
      responses:
        "201":
          description: Program created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgramSummary"

  /programs/{programId}:
    get:
      operationId: getProgram
      tags: [programs]
      summary: Get program detail
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Program detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgramDetail"
    put:
      operationId: updateProgram
      tags: [programs]
      summary: Update a program
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProgramRequest"
      responses:
        "200":
          description: Program updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgramSummary"
    delete:
      operationId: deleteProgram
      tags: [programs]
      summary: Delete a program (coach only, owns program)
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Program deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Program not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /programs/{programId}/sessions:
    post:
      operationId: addProgramSession
      tags: [programs]
      summary: Add session to program
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /programs/{programId}/sessions/{sessionId}:
    delete:
      operationId: deleteProgramSession
      tags: [programs]
      summary: Delete a session from a program (coach only, owns program)
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProgramSession
      tags: [programs]
      summary: Update program session
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "200":
          description: Session updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ATHLETE
  /athlete/upcoming-sessions:
    get:
      operationId: getAthleteUpcomingSessions
      tags: [athlete]
      summary: Get upcoming sessions for the athlete
      responses:
        "200":
          description: Upcoming sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UpcomingSession"

  /athlete/library-sessions:
    get:
      operationId: getLibrarySessions
      tags: [athlete]
      summary: Get all sessions from the active program (library)
      responses:
        "200":
          description: Library sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LibrarySession"

  /athlete/tests:
    get:
      operationId: getAthleteTests
      tags: [athlete]
      summary: Get athlete performance tests
      responses:
        "200":
          description: Performance tests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AthletePerformanceTest"

  /athlete/programs:
    get:
      operationId: getAthletePrograms
      tags: [athlete]
      summary: Get programs assigned to the athlete
      responses:
        "200":
          description: Programs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgramSummary"

  /athlete/programs/{programId}/preview:
    get:
      operationId: getAthleteProgramPreview
      tags: [athlete]
      summary: Get a preview of a program
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Program preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgramDetail"

  /athlete/programs/{programId}/start-now:
    post:
      operationId: startProgramNow
      tags: [athlete]
      summary: Start a preview program now
      parameters:
        - name: programId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Program started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartProgramNowResult"

  /athlete/link:
    post:
      operationId: athleteLink
      tags: [athlete]
      summary: Link athlete to a coach using invite code
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AthleteLinkRequest"
      responses:
        "200":
          description: Linked to coach successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid invite code

  # COACH
  /coach/clients:
    get:
      operationId: getClients
      tags: [coach]
      summary: Get coach clients with today's status
      responses:
        "200":
          description: Clients list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientSummary"

  /coach/clients/{clientId}:
    get:
      operationId: getClientDetail
      tags: [coach]
      summary: Get client detail
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Client detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDetail"
    delete:
      operationId: unlinkClient
      tags: [coach]
      summary: Unlink client from coach
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Client unlinked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /coach/clients/{clientId}/profile:
    patch:
      operationId: coachUpdateAthleteProfile
      tags: [coach]
      summary: Update client profile (coach)
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CoachUpdateAthleteRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /coach/clients/{clientId}/checkins:
    get:
      operationId: getClientCheckins
      tags: [coach]
      summary: Get client check-in history
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Client check-in history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CheckinData"

  /coach/clients/{clientId}/override:
    post:
      operationId: overrideClientSession
      tags: [coach]
      summary: Override client session mode
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OverrideRequest"
      responses:
        "200":
          description: Override applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /coach/clients/{clientId}/tests:
    get:
      operationId: getClientTests
      tags: [coach]
      summary: Get performance tests for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Performance tests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AthletePerformanceTest"
    post:
      operationId: createClientTest
      tags: [coach]
      summary: Create a performance test for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePerformanceTestRequest"
      responses:
        "201":
          description: Test created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AthletePerformanceTest"

  /coach/clients/{clientId}/tests/{testId}:
    delete:
      operationId: deleteClientTest
      tags: [coach]
      summary: Delete a performance test
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
        - name: testId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Test deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /coach/clients/{clientId}/sessions/{sessionLogId}:
    get:
      operationId: getClientSessionDetail
      tags: [coach]
      summary: Get a session log detail for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
        - name: sessionLogId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"

  /coach/alerts:
    get:
      operationId: getAlerts
      tags: [coach]
      summary: Get coach alerts
      responses:
        "200":
          description: Alerts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlertData"

  /coach/alerts/{alertId}/resolve:
    put:
      operationId: resolveAlert
      tags: [coach]
      summary: Resolve an alert
      parameters:
        - name: alertId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveAlertRequest"
      responses:
        "200":
          description: Alert resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /coach/invite-code:
    get:
      operationId: getInviteCode
      tags: [coach]
      summary: Get coach invite code
      responses:
        "200":
          description: Invite code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteCodeResponse"

  /coach/link:
    post:
      operationId: coachLink
